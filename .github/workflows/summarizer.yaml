name: Morning News Summarizer

on:
  workflow_dispatch:        # allow manual runs

jobs:
  summarize:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit metrics.csv back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run summarizer
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Ensure metrics.csv ends with newline
        run: |
          [ -n "$(tail -c1 metrics.csv)" ] && echo "" >> metrics.csv || true

      - name: Commit metrics.csv
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics.csv
          git diff --cached --quiet || git commit -m "chore: update metrics [skip ci]"
          git push